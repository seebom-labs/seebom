# docker-compose.yml – Local development stack
# Usage: docker compose up -d
#
# Configure SBOM_SOURCE_DIR in .env to point at your SBOM repository.
# Default: ./sboms (bundled examples)

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/init/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    environment:
      CLICKHOUSE_DB: seebom
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api-gateway
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: seebom
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      API_PORT: "8080"
      EXCEPTIONS_FILE: /data/config/license-exceptions.json
      LICENSE_POLICY_FILE: /data/config/license-policy.json
    volumes:
      - ./sboms/license-exceptions.json:/data/config/license-exceptions.json:ro
      - ./sboms/license-policy.json:/data/config/license-policy.json:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  ingestion-watcher:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ingestion-watcher
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: seebom
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      SBOM_DIR: /data/sboms
      SBOM_LIMIT: ${SBOM_LIMIT:-0}
    volumes:
      - ${SBOM_SOURCE_DIR:-./sboms}:/data/sboms:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  parsing-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: parsing-worker
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: seebom
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      SBOM_DIR: /data/sboms
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-50}
      SKIP_OSV: ${SKIP_OSV:-false}
      SKIP_GITHUB_RESOLVE: ${SKIP_GITHUB_RESOLVE:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      EXCEPTIONS_FILE: /data/config/license-exceptions.json
      LICENSE_POLICY_FILE: /data/config/license-policy.json
    volumes:
      - ${SBOM_SOURCE_DIR:-./sboms}:/data/sboms:ro
      - ./sboms/license-exceptions.json:/data/config/license-exceptions.json:ro
      - ./sboms/license-policy.json:/data/config/license-policy.json:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    volumes:
      - ${CUSTOM_THEME:-./ui/src/assets/custom-theme.example.css}:/usr/share/nginx/html/custom-theme.css:ro
      - ${UI_CONFIG:-./ui/public/ui-config.json}:/usr/share/nginx/html/ui-config.json:ro
    depends_on:
      - api-gateway

  cve-refresher:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: cve-refresher
    profiles: ["cve-refresh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: seebom
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:


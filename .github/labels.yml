## Labels for GitHub Issues and PRs
## Synced automatically via .github/workflows/sync-labels.yml
## Manual sync: make sync-labels (requires gh CLI)

# ─── Release Notes Categories ────────────────────────────────────────────────
- name: enhancement
  color: "a2eeef"
  description: "New feature or improvement"

- name: feature
  color: "0075ca"
  description: "New feature request"

- name: bug
  color: "d73a4a"
  description: "Something isn't working"

- name: fix
  color: "e4e669"
  description: "Bug fix"

- name: documentation
  color: "0075ca"
  description: "Documentation changes"

- name: docs
  color: "0075ca"
  description: "Documentation changes"

- name: test
  color: "bfd4f2"
  description: "Test improvements"

- name: testing
  color: "bfd4f2"
  description: "Test improvements"

- name: security
  color: "ee0701"
  description: "Security related changes"

# ─── Maintenance ─────────────────────────────────────────────────────────────
- name: chore
  color: "fef2c0"
  description: "Maintenance and housekeeping"

- name: dependencies
  color: "0366d6"
  description: "Dependency updates"

- name: ci
  color: "e1e4e8"
  description: "CI/CD pipeline changes"

# ─── Components ──────────────────────────────────────────────────────────────
- name: backend
  color: "00ADD8"
  description: "Go backend (API, workers, parsers)"

- name: frontend
  color: "DD0031"
  description: "Angular UI"

- name: helm
  color: "0F1689"
  description: "Helm chart / Kubernetes deployment"

- name: clickhouse
  color: "FFCC00"
  description: "ClickHouse schema or queries"

# ─── Priority ────────────────────────────────────────────────────────────────
- name: "priority: critical"
  color: "b60205"
  description: "Must be resolved immediately"

- name: "priority: high"
  color: "d93f0b"
  description: "Should be resolved soon"

- name: "priority: low"
  color: "c2e0c6"
  description: "Nice to have"

# ─── Status ──────────────────────────────────────────────────────────────────
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: skip-changelog
  color: "ededed"
  description: "Exclude from auto-generated release notes"


name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  REPO: seebom-labs/seebom

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: ingestion-watcher
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - target: parsing-worker
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - target: api-gateway
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - target: ui
            context: ./ui
            dockerfile: ./ui/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target != 'ui' && matrix.target || '' }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.target }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.target }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  helm-package:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" deploy/helm/seebom/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" deploy/helm/seebom/Chart.yaml

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${{ steps.version.outputs.version }}\"/" deploy/helm/seebom/values.yaml

      - name: Package Helm chart
        run: helm package deploy/helm/seebom --destination .helm-pkg

      - name: Push Helm chart to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm push .helm-pkg/seebom-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ env.REPO }}/charts


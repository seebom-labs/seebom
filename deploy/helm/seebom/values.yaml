# SeeBOM Helm values

# Container image defaults
image:
  registry: ghcr.io
  repository: seebom-labs/seebom
  tag: "0.1.3"
  pullPolicy: IfNotPresent

# GitHub API token for license resolution (optional, increases rate limit from 60 to 5000 req/h)
github:
  token: ""

# S3 bucket ingestion (default, recommended)
# Ingest SBOMs directly from S3-compatible buckets (AWS S3, MinIO, GCS).
# No PVC, git-sync, or seed job required. Streams object listings with pagination.
# The Parsing Workers fetch objects on-demand via s3:// URIs.
# Set s3.buckets to a JSON array of bucket configs. Leave empty to use volume-based alternatives.
s3:
  # JSON array of bucket configs. Injected as S3_BUCKETS env var.
  # Example: [{"name":"cncf-subproject-sboms","region":"us-east-1"},{"name":"cncf-project-sboms","region":"us-east-1"}]
  buckets: ""
  # Shared credentials (applied to all buckets without their own keys).
  # For public buckets, leave empty.
  accessKey: ""
  secretKey: ""

# ClickHouse (provisioned via ClickHouse Operator)
clickhouse:
  host: chi-seebom-clickhouse-seebom-cluster-0-0
  port: 9000
  database: seebom
  user: default
  password: ""
  userPasswordSecret:
    enabled: false
    secretName: ""
    key: ""
  cluster:
    name: seebom-cluster
    shardsCount: 1
    replicasCount: 1
  installation:
    podTemplate:
      containerImage: docker.io/clickhouse/clickhouse-server:24.8
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 1000m
          memory: 1Gi
    volumeClaimTemplate:
      dataStorage: 1Gi
      logStorage: 100Mi

# SBOM source via PVC (alternative to S3, for environments without S3 access)
sbomSource:
  pvcName: seebom-sbom-data
  mountPath: /data/sboms
  storageSize: 1Gi

# git-sync: alternative to S3 — pulls SBOMs from a Git repository into a PVC.
# Only suitable for small repos (< 1 GB). For large-scale ingestion, use S3 instead.
gitSync:
  enabled: true
  image: registry.k8s.io/git-sync/git-sync:v4.4.0
  repo: "https://github.com/your-org/sbom-repo.git"
  branch: main
  depth: 1          # shallow clone
  period: "6h"      # re-sync interval (sidecar mode)
  root: /data/sboms
  timeout: 120       # seconds for git clone/checkout (increase for large repos)
  # For private repos, mount a Secret with SSH key or token:
  # secretName: git-sync-credentials

# License exceptions (mounted as ConfigMap, read-only)
licenseExceptions:
  enabled: true
  mountPath: /data/config/license-exceptions.json

# License policy – defines permissive/copyleft classification (ConfigMap, read-only)
licensePolicy:
  enabled: true
  mountPath: /data/config/license-policy.json

# Ingestion Watcher (CronJob)
ingestionWatcher:
  schedule: "0 */6 * * *"  # Every 6 hours
  sbomLimit: 0              # 0 = unlimited
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Parsing Worker (Deployment)
parsingWorker:
  replicas: 5
  batchSize: 50
  skipOSV: false            # Set to true for fast initial bulk load
  skipGitHubResolve: false  # Skip GitHub license resolution for unknown licenses
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# API Gateway (Deployment)
apiGateway:
  replicas: 2
  port: 8080
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# UI (Deployment)
ui:
  replicas: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Custom CSS theme – mount a custom-theme.css to override colors.
  # Edit the ConfigMap to rebrand the UI without rebuilding.
  customTheme:
    enabled: false
  # Site configuration – override brand name, dashboard texts, disclaimer etc.
  # All text fields support HTML. Edit via Helm values or kubectl edit configmap.
  siteConfig:
    enabled: false
    content:
      brandName: "SeeBOM"
      pageTitle: "SeeBOM"
      dashboard:
        title: "Dashboard"
        subtitle: "Software Bill of Materials — Governance Overview"
        description: '<strong>SeeBOM</strong> autonomously ingests SPDX SBOMs from the CNCF ecosystem, cross-references known vulnerabilities via the <a href="https://osv.dev" target="_blank" rel="noopener">OSV database</a>, evaluates license compliance against a configurable policy, and applies <a href="https://openvex.dev" target="_blank" rel="noopener">OpenVEX</a> statements to suppress non-applicable findings — giving you a single pane of glass for software supply-chain governance.'
        disclaimer: '<strong>Disclaimer:</strong> The data shown on this dashboard is provided on an "as-is" basis for informational purposes only. Vulnerability and license information is sourced from third-party databases (OSV, GitHub) and may be incomplete or delayed. SeeBOM does not guarantee the accuracy, completeness, or timeliness of any data and is not a substitute for professional security audits or legal advice. Use at your own risk.'
      footer:
        enabled: false
        text: ""

# CVE Refresher (CronJob) – checks all known PURLs for newly disclosed CVEs.
cveRefresher:
  enabled: true
  schedule: "0 2 * * *"    # Daily at 2 AM
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Seed Job (only used when gitSync.enabled=false)
# Clones an SBOM git repo into the PVC on first install.
seedJob:
  sbomRepo: "https://github.com/cncf/sbom.git"
  sbomBranch: main
  # Set to download CNCF license exceptions into the SBOM PVC:
  # cncfExceptionsURL: "https://raw.githubusercontent.com/cncf/foundation/main/license-exceptions/exceptions.json"


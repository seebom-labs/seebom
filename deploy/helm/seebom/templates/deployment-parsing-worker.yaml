apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-parsing-worker
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/component: parsing-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.parsingWorker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: seebom
      app.kubernetes.io/component: parsing-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seebom
        app.kubernetes.io/component: parsing-worker
        {{- if not .Values.gitSync.enabled }}
        seebom.io/sbom-volume: "true"
        {{- end }}
    spec:
      {{- if not .Values.gitSync.enabled }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: seebom.io/sbom-volume
                    operator: Exists
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if .Values.gitSync.enabled }}
      initContainers:
        - name: git-sync-init
          image: {{ .Values.gitSync.image }}
          args:
            - --repo={{ .Values.gitSync.repo }}
            - --ref={{ .Values.gitSync.branch }}
            - --depth={{ .Values.gitSync.depth }}
            - --root={{ .Values.gitSync.root }}
            - --one-time
            {{- if .Values.gitSync.timeout }}
            - --sync-timeout={{ .Values.gitSync.timeout }}s
            {{- end }}
          volumeMounts:
            - name: sbom-data
              mountPath: {{ .Values.gitSync.root }}
          {{- if .Values.gitSync.secretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.gitSync.secretName }}
          {{- end }}
      {{- end }}
      containers:
        - name: parsing-worker
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/parsing-worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          resources:
            {{- toYaml .Values.parsingWorker.resources | nindent 12 }}
          volumeMounts:
            - name: sbom-data
              mountPath: {{ .Values.sbomSource.mountPath }}
              readOnly: true
            {{- if .Values.licenseExceptions.enabled }}
            - name: license-exceptions
              mountPath: {{ .Values.licenseExceptions.mountPath }}
              subPath: license-exceptions.json
              readOnly: true
            {{- end }}
            {{- if .Values.licensePolicy.enabled }}
            - name: license-policy
              mountPath: {{ .Values.licensePolicy.mountPath }}
              subPath: license-policy.json
              readOnly: true
            {{- end }}
      volumes:
        - name: sbom-data
          {{- if .Values.gitSync.enabled }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Values.sbomSource.pvcName }}
          {{- end }}
        {{- if .Values.licenseExceptions.enabled }}
        - name: license-exceptions
          configMap:
            name: {{ .Release.Name }}-license-exceptions
        {{- end }}
        {{- if .Values.licensePolicy.enabled }}
        - name: license-policy
          configMap:
            name: {{ .Release.Name }}-license-policy
        {{- end }}


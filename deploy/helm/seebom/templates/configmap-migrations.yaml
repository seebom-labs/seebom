apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-migrations
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  {{- range $path, $_ := .Files.Glob "migrations/*.sql" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
  run-migrations.sh: |
    #!/bin/sh
    set -e
    echo "⏳ Waiting for ClickHouse to be ready..."
    until clickhouse-client --host="$CH_HOST" --port="$CH_PORT" \
          --user="$CH_USER" --password="$CH_PASSWORD" \
          --query="SELECT 1" >/dev/null 2>&1; do
      echo "  ClickHouse not ready, retrying in 3s..."
      sleep 3
    done

    echo "⏳ Creating database '$CH_DATABASE'..."
    clickhouse-client --host="$CH_HOST" --port="$CH_PORT" \
      --user="$CH_USER" --password="$CH_PASSWORD" \
      --query="CREATE DATABASE IF NOT EXISTS $CH_DATABASE"

    echo "⏳ Running migrations..."
    for f in /migrations/*.sql; do
      echo "  → $(basename $f)"
      clickhouse-client --host="$CH_HOST" --port="$CH_PORT" \
        --user="$CH_USER" --password="$CH_PASSWORD" \
        --database="$CH_DATABASE" --multiquery < "$f"
    done
    echo "✅ Database initialized."


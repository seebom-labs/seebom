apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-ingestion-watcher
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/component: ingestion-watcher
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.ingestionWatcher.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: seebom
            app.kubernetes.io/component: ingestion-watcher
            {{- if not .Values.gitSync.enabled }}
            seebom.io/sbom-volume: "true"
            {{- end }}
        spec:
          restartPolicy: OnFailure
          {{- if not .Values.gitSync.enabled }}
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: seebom.io/sbom-volume
                        operator: Exists
                  topologyKey: kubernetes.io/hostname
          {{- end }}
          {{- if .Values.gitSync.enabled }}
          initContainers:
            - name: git-sync
              image: {{ .Values.gitSync.image }}
              args:
                - --repo={{ .Values.gitSync.repo }}
                - --ref={{ .Values.gitSync.branch }}
                - --depth={{ .Values.gitSync.depth }}
                - --root={{ .Values.gitSync.root }}
                - --one-time
                {{- if .Values.gitSync.timeout }}
                - --sync-timeout={{ .Values.gitSync.timeout }}s
                {{- end }}
              volumeMounts:
                - name: sbom-data
                  mountPath: {{ .Values.gitSync.root }}
              {{- if .Values.gitSync.secretName }}
              envFrom:
                - secretRef:
                    name: {{ .Values.gitSync.secretName }}
              {{- end }}
          {{- end }}
          containers:
            - name: ingestion-watcher
              image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/ingestion-watcher:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
                - secretRef:
                    name: {{ .Release.Name }}-secret
               {{- if .Values.s3.credentialsSecret.enabled }}
              env:
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.credentialsSecret.secretName }}
                      key: {{ .Values.s3.credentialsSecret.accessKeyKey }}
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.credentialsSecret.secretName }}
                      key: {{ .Values.s3.credentialsSecret.secretKeyKey }}
              {{- end }}
              resources:
                {{- toYaml .Values.ingestionWatcher.resources | nindent 16 }}
              volumeMounts:
                - name: sbom-data
                  mountPath: {{ .Values.sbomSource.mountPath }}
                  readOnly: true
          volumes:
            - name: sbom-data
              {{- if .Values.gitSync.enabled }}
              emptyDir: {}
              {{- else }}
              persistentVolumeClaim:
                claimName: {{ .Values.sbomSource.pvcName }}
              {{- end }}


apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | b64enc | quote }}
  {{- if .Values.github.token }}
  GITHUB_TOKEN: {{ .Values.github.token | b64enc | quote }}
  {{- end }}


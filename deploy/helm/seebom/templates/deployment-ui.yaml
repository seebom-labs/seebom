apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/component: ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: seebom
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seebom
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/ui:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/seebom.conf
              subPath: seebom.conf
              readOnly: true
            {{- if .Values.ui.customTheme.enabled }}
            - name: custom-theme
              mountPath: /usr/share/nginx/html/custom-theme.css
              subPath: custom-theme.css
              readOnly: true
            {{- end }}
            {{- if .Values.ui.siteConfig.enabled }}
            - name: ui-config
              mountPath: /usr/share/nginx/html/ui-config.json
              subPath: ui-config.json
              readOnly: true
            {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx-config
        {{- if .Values.ui.customTheme.enabled }}
        - name: custom-theme
          configMap:
            name: {{ .Release.Name }}-custom-theme
        {{- end }}
        {{- if .Values.ui.siteConfig.enabled }}
        - name: ui-config
          configMap:
            name: {{ .Release.Name }}-ui-config
        {{- end }}


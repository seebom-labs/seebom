{{- if .Values.licensePolicy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-license-policy
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  license-policy.json: |-
    {
      "description": "License classification policy. Edit this ConfigMap to customise.",
      "permissive": [
        "MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
        "Unlicense", "0BSD", "CC0-1.0", "Zlib", "BSL-1.0", "PSF-2.0",
        "CC-BY-3.0", "CC-BY-4.0", "FTL", "X11", "Artistic-2.0",
        "PostgreSQL", "WTFPL", "JSON", "Pixar", "Unicode-3.0", "Unicode-DFS-2016"
      ],
      "copyleft": [
        "GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only", "GPL-3.0-or-later",
        "LGPL-2.1-only", "LGPL-2.1-or-later", "LGPL-3.0-only", "LGPL-3.0-or-later",
        "AGPL-3.0-only", "AGPL-3.0-or-later", "MPL-2.0",
        "EPL-1.0", "EPL-2.0", "EUPL-1.2", "CPAL-1.0",
        "CECILL-2.1", "OSL-3.0", "SSPL-1.0", "RPL-1.5"
      ]
    }
{{- end }}


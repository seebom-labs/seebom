{{- if .Values.licensePolicy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-license-policy
  labels:
    app.kubernetes.io/name: seebom
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  license-policy.json: |-
    {{- if .Values.licensePolicy.custom }}
    {{ .Values.licensePolicy.custom | nindent 4 }}
    {{- else }}
    {
      "description": "Based on the CNCF Allowed Third-Party License Policy. Apache-2.0 plus the CNCF Allowlist are permissive.",
      "permissive": [
        "Apache-2.0", "MIT", "MIT-0", "0BSD",
        "BSD-2-Clause", "BSD-2-Clause-FreeBSD", "BSD-3-Clause",
        "ISC", "PSF-2.0", "Python-2.0", "Python-2.0.1",
        "PostgreSQL", "UPL-1.0", "X11", "Zlib",
        "OpenSSL", "OpenSSL-standalone", "SSLeay-standalone"
      ],
      "copyleft": [
        "GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only", "GPL-3.0-or-later",
        "LGPL-2.1-only", "LGPL-2.1-or-later", "LGPL-3.0-only", "LGPL-3.0-or-later",
        "AGPL-3.0-only", "AGPL-3.0-or-later", "MPL-2.0",
        "EPL-1.0", "EPL-2.0", "EUPL-1.2", "CPAL-1.0",
        "CECILL-2.1", "OSL-3.0", "SSPL-1.0", "RPL-1.5",
        "CC-BY-SA-4.0", "CC-BY-NC-4.0"
      ]
    }
    {{- end }}
{{- end }}


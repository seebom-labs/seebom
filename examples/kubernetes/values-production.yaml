# SeeBOM – Production Helm Values
#
# Suitable for a real Kubernetes cluster (EKS, GKE, AKS, self-hosted).
# Default ingestion: S3 buckets (set s3.buckets). Fallback: seed job into PVC.
# HA replicas, ClusterIP services.
#
# Usage:
#   helm install seebom deploy/helm/seebom/ -n seebom -f values-production.yaml \
#     --set clickhouse.password=<PASSWORD> \
#     --set 's3.buckets=[{"name":"cncf-subproject-sboms","region":"us-east-1"}]'

# ─── Images ──────────────────────────────────────────────────────────────────
image:
  registry: ghcr.io
  repository: seebom-labs/seebom
  tag: "0.1.3"
  pullPolicy: IfNotPresent

# ─── ClickHouse ──────────────────────────────────────────────────────────────
clickhouse:
  host: chi-seebom-clickhouse-seebom-cluster-0-0
  port: 9000
  database: seebom
  user: default
  password: ""   # pass via --set or reference an existing K8s Secret
  cluster:
    name: seebom-cluster
    shardsCount: 1
    replicasCount: 2         # 2 replicas for HA
  installation:
    podTemplate:
      containerImage: docker.io/clickhouse/clickhouse-server:24.8
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: "1"
          memory: 2Gi
    volumeClaimTemplate:
      dataStorage: 50Gi      # production workloads need more storage
      logStorage: 1Gi

# ─── GitHub ──────────────────────────────────────────────────────────────────
github:
  token: ""   # pass via --set or reference an existing K8s Secret

# ─── S3 Bucket Ingestion (default, recommended) ─────────────────────────────
# Ingest SBOMs directly from S3 buckets. No PVC, git-sync, or seed job needed.
# Works alongside local files if both are configured.
s3:
  # Example: ingest from two public CNCF SBOM buckets
  # buckets: '[{"name":"cncf-subproject-sboms","region":"us-east-1"},{"name":"cncf-project-sboms","region":"us-east-1"}]'
  buckets: ""
  accessKey: ""   # pass via --set for private buckets
  secretKey: ""   # pass via --set for private buckets
  # Or reference an existing Kubernetes Secret (recommended for production):
  # credentialsSecret:
  #   enabled: true
  #   secretName: "my-s3-credentials"
  #   accessKeyKey: "S3_ACCESS_KEY"
  #   secretKeyKey: "S3_SECRET_KEY"

# ─── SBOM Source via PVC (alternative to S3) ─────────────────────────────────
# The seed job does a shallow git clone into a PVC on first install.
# Only needed if S3 is not available. For S3-based ingestion, set s3.buckets above.
gitSync:
  enabled: false

seedJob:
  sbomRepo: "https://github.com/cncf/sbom.git"    # ← change to your SBOM repo
  sbomBranch: main
  # Download CNCF license exceptions into the SBOM PVC:
  cncfExceptionsURL: "https://raw.githubusercontent.com/cncf/foundation/main/license-exceptions/exceptions.json"

sbomSource:
  pvcName: seebom-sbom-data
  mountPath: /data/sboms
  storageSize: 20Gi

# ─── License Config ─────────────────────────────────────────────────────────
# Default: CNCF Allowed Third-Party License Policy
# (Apache-2.0 + CNCF Allowlist are permissive, everything else needs an exception)
licenseExceptions:
  enabled: true
  mountPath: /data/config/license-exceptions.json

licensePolicy:
  enabled: true
  mountPath: /data/config/license-policy.json
  # Override the default CNCF policy if your org has different rules:
  # custom: |
  #   {
  #     "description": "My org policy",
  #     "permissive": ["Apache-2.0", "MIT", "BSD-3-Clause"],
  #     "copyleft": ["GPL-2.0-only", "GPL-3.0-only", "AGPL-3.0-only"]
  #   }

# ─── Ingestion Watcher ──────────────────────────────────────────────────────
ingestionWatcher:
  schedule: "0 */6 * * *"    # Every 6 hours
  sbomLimit: 0
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ─── Parsing Workers ────────────────────────────────────────────────────────
parsingWorker:
  replicas: 5                # scale up for faster processing
  batchSize: 50
  skipOSV: false
  skipGitHubResolve: false
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1", memory: 1Gi }

# ─── API Gateway ────────────────────────────────────────────────────────────
apiGateway:
  replicas: 2                # HA
  port: 8080
  service:
    type: ClusterIP          # use Ingress to expose
    port: 80
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

# ─── UI ─────────────────────────────────────────────────────────────────────
ui:
  replicas: 2                # HA
  service:
    type: ClusterIP          # use Ingress to expose
    port: 80
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  customTheme:
    enabled: false
  siteConfig:
    enabled: false

# ─── CVE Refresher ──────────────────────────────────────────────────────────
cveRefresher:
  enabled: true
  schedule: "0 2 * * *"      # Daily at 2 AM
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

